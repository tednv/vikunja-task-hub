name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API tokens, private URLs, task content, personal data, or unredacted diagnostics.
  - type: input
    id: version
    attributes:
      label: Vikunja Task Hub version
    validations:
      required: true
  - type: input
    id: platforms
    attributes:
      label: Home Assistant and Vikunja versions
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Use neutral sample data and redact sensitive values.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed tokens, private URLs, task content, personal data, and unique infrastructure details.
          required: true
